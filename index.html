<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevCore</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg1:#07101f;
      --bg2:#0c1630;
      --login1:#2563eb;
      --login2:#3b82f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow:0 24px 60px rgba(0,0,0,.22);
      --soft:#dbeafe;
      --glass:rgba(255,255,255,.18);
      --glassBorder:rgba(255,255,255,.22);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:0;
    }

    .app{
      width:min(100vw, 430px);
      min-height:100vh;
      height:100dvh;
      background:#fff;
      overflow:hidden;
      position:relative;
    }

    @media (min-width: 431px){
      body{ padding:18px; }
      .app{
        width:min(100vw - 24px, 430px);
        height:844px;
        min-height:844px;
        border-radius:32px;
        box-shadow:var(--shadow);
      }
    }

    .base-bg{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,var(--login1) 0%, var(--login2) 42%, #f8fafc 42%, #f8fafc 100%);
      z-index:1;
    }

    .screen{
      position:relative;
      z-index:2;
      height:100%;
    }

    .hidden{ display:none !important; }

    .login-screen{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }

    .login-card{
      width:100%;
      background:rgba(255,255,255,.98);
      border-radius:28px;
      padding:22px;
      box-shadow:0 20px 50px rgba(0,0,0,.12);
      border:1px solid rgba(255,255,255,.7);
    }

    .logo{
      width:84px;
      height:84px;
      border-radius:50%;
      background:linear-gradient(180deg,var(--login1),var(--login2));
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:16px;
      box-shadow:0 16px 35px rgba(37,99,235,.28);
      border:3px solid rgba(255,255,255,.8);
      color:#fff;
      font-size:34px;
      font-weight:900;
    }

    h1{
      font-size:28px;
      font-weight:900;
      color:var(--text);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:-.5px;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
      margin-bottom:18px;
    }

    .field{
      margin-bottom:14px;
    }

    .field label{
      display:block;
      font-size:13px;
      font-weight:800;
      color:#1f2937;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .field input{
      width:100%;
      border:1px solid var(--line);
      background:#f9fafb;
      border-radius:16px;
      padding:15px 14px;
      font-size:15px;
      color:var(--text);
      outline:none;
    }

    .field input:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(59,130,246,.10);
    }

    .btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:15px 16px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      text-transform:uppercase;
    }

    .btn-primary{
      background:linear-gradient(180deg,var(--login1),var(--login2));
      color:#fff;
      box-shadow:0 12px 26px rgba(37,99,235,.22);
    }

    .btn-dark{
      background:#111827;
      color:#fff;
    }

    .error-box{
      background:#fef2f2;
      color:#b91c1c;
      border:1px solid #fecaca;
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      margin-bottom:14px;
      display:none;
      text-transform:uppercase;
      font-weight:700;
      white-space:pre-line;
    }

    .hint{
      margin-top:14px;
      color:#6b7280;
      font-size:12px;
      line-height:1.7;
    }

    .panel-screen{
      height:100%;
      display:flex;
      flex-direction:column;
    }

    .top{
      padding:18px 16px 10px;
      color:#fff;
      flex:0 0 auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      background:rgba(255,255,255,.92);
      color:#7a7a7a;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      font-weight:900;
      flex-shrink:0;
    }

    .brand-text h2{
      font-size:18px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:4px;
      text-transform:uppercase;
    }

    .brand-text p{
      font-size:14px;
      opacity:.95;
      font-weight:600;
    }

    .logout-btn{
      background:var(--glass);
      color:#fff;
      border:1px solid var(--glassBorder);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      cursor:pointer;
    }

    .banner{
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:12px 14px;
      margin-bottom:12px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .stat{
      background:linear-gradient(180deg, rgba(0,0,0,.14), rgba(0,0,0,.08));
      border-radius:20px;
      padding:14px;
      min-height:120px;
      border:1px solid rgba(255,255,255,.08);
    }

    .stat .label{
      font-size:11px;
      opacity:.95;
      margin-bottom:12px;
      font-weight:800;
      text-transform:uppercase;
    }

    .stat .value{
      font-size:34px;
      font-weight:900;
      line-height:1;
      margin-bottom:12px;
    }

    .stat .sub{
      font-size:11px;
      opacity:.95;
      text-transform:uppercase;
      font-weight:700;
    }

    .main{
      flex:1 1 auto;
      min-height:0;
      background:#f8fafc;
      border-top-left-radius:28px;
      border-top-right-radius:28px;
      padding:14px 14px 84px;
      overflow-y:auto;
      overflow-x:hidden;
    }

    .tabs{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:8px;
      margin-bottom:16px;
    }

    .tabs button{
      border:none;
      background:#eef2f7;
      color:#1f2937;
      border-radius:14px;
      padding:10px 6px;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      cursor:pointer;
    }

    .tabs button.active{
      background:var(--soft);
      color:var(--login1);
    }

    .panel{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:22px;
      padding:16px;
      box-shadow:0 18px 45px rgba(15,23,42,.07);
    }

    .panel-title{
      font-size:18px;
      font-weight:900;
      color:var(--text);
      margin-bottom:14px;
      text-transform:uppercase;
    }

    .panel-card{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }

    .panel-card:last-child{
      margin-bottom:0;
    }

    .panel-card h3{
      font-size:15px;
      font-weight:900;
      color:#111827;
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .panel-card p{
      font-size:13px;
      color:#6b7280;
      line-height:1.6;
      text-transform:uppercase;
    }

    .profile-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .mini-box{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:12px;
    }

    .mini-box small{
      display:block;
      font-size:10px;
      color:#6b7280;
      margin-bottom:6px;
      text-transform:uppercase;
      font-weight:700;
    }

    .mini-box strong{
      font-size:13px;
      color:#111827;
      text-transform:uppercase;
      word-break:break-word;
    }

    .bottom-nav{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(14px);
      height:74px;
      display:flex;
      justify-content:space-around;
      align-items:center;
      border-top:1px solid rgba(15,23,42,.06);
      z-index:3;
    }

    .nav-item{
      text-align:center;
      color:#8a93a3;
      font-size:10px;
      font-weight:800;
      cursor:pointer;
      text-transform:uppercase;
    }

    .nav-item .icon{
      display:block;
      font-size:18px;
      margin-bottom:4px;
    }

    .nav-item.active{
      color:var(--login1);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="base-bg"></div>

    <div class="screen" id="loginScreen">
      <div class="login-screen">
        <div class="login-card">
          <div class="logo">D</div>
          <h1>Dev Login</h1>
          <div class="subtitle">Acesso do painel principal.</div>

          <div class="error-box" id="loginError"></div>

          <div class="field">
            <label for="username">Usuário</label>
            <input id="username" type="text" placeholder="dev">
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <input id="password" type="password" placeholder="Digite sua senha">
          </div>

          <button class="btn btn-primary" id="loginBtn">Entrar</button>

          <div class="hint">
            Login apenas do DEV por enquanto.<br>
            Conta esperada no banco:<br>
            usuário: dev<br>
            senha: dev123
          </div>
        </div>
      </div>
    </div>

    <div class="screen hidden" id="panelScreen">
      <div class="panel-screen">
        <div class="top">
          <div class="topbar">
            <div class="brand">
              <div class="avatar">D</div>
              <div class="brand-text">
                <h2>Development</h2>
                <p>Painel administrativo</p>
              </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Sair</button>
          </div>

          <div class="banner">Modo desenvolvedor • 4 painéis visíveis • só DEV ativo</div>

          <div class="stats">
            <div class="stat">
              <div class="label">Sessão</div>
              <div class="value">ON</div>
              <div class="sub">Status atual</div>
            </div>
            <div class="stat">
              <div class="label">Painéis</div>
              <div class="value">4</div>
              <div class="sub">HG, DRIP, MISTO, DEV</div>
            </div>
          </div>
        </div>

        <div class="main">
          <div class="tabs">
            <button class="tab-btn active" data-tab="hg">HG</button>
            <button class="tab-btn" data-tab="drip">DRIP</button>
            <button class="tab-btn" data-tab="misto">MISTO</button>
            <button class="tab-btn" data-tab="dev">DEV</button>
          </div>

          <div class="panel" id="tabContent"></div>
        </div>

        <div class="bottom-nav">
          <div class="nav-item active">
            <span class="icon">◉</span>Painel
          </div>
          <div class="nav-item">
            <span class="icon">☰</span>Menu
          </div>
          <div class="nav-item">
            <span class="icon">⚙</span>Dev
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://iwhldffataeqmpntprvk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wYhrdDe0bM-H3QqmcMwXRQ_RGb_u5ok";

    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginScreen = document.getElementById("loginScreen");
    const panelScreen = document.getElementById("panelScreen");
    const loginError = document.getElementById("loginError");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const tabContent = document.getElementById("tabContent");
    const tabButtons = document.querySelectorAll(".tab-btn");

    let currentUser = null;

    const tabViews = {
      hg: `
        <div class="panel-title">HG</div>
        <div class="panel-card">
          <h3>HG Menu</h3>
          <p>Preview do painel HG. Essa área fica pronta para ligar depois com banco, validade, contas e funções reais.</p>
        </div>
        <div class="panel-card">
          <h3>Status</h3>
          <p>Modo teste ativo.</p>
        </div>
      `,
      drip: `
        <div class="panel-title">DRIP</div>
        <div class="panel-card">
          <h3>DRIP Menu</h3>
          <p>Preview do painel DRIP. Essa área fica pronta para ligar depois com banco, validade, contas e funções reais.</p>
        </div>
        <div class="panel-card">
          <h3>Status</h3>
          <p>Modo teste ativo.</p>
        </div>
      `,
      misto: `
        <div class="panel-title">MISTO</div>
        <div class="panel-card">
          <h3>MISTO Menu</h3>
          <p>Preview do painel misto. Essa área fica pronta para ligar depois com banco, troca de gerador e funções reais.</p>
        </div>
        <div class="panel-card">
          <h3>Status</h3>
          <p>Modo teste ativo.</p>
        </div>
      `,
      dev: `
        <div class="panel-title">DEV</div>
        <div class="profile-grid">
          <div class="mini-box">
            <small>Usuário</small>
            <strong id="devUserValue">-</strong>
          </div>
          <div class="mini-box">
            <small>Tipo</small>
            <strong id="devTypeValue">DEV</strong>
          </div>
          <div class="mini-box">
            <small>Status</small>
            <strong>ONLINE</strong>
          </div>
          <div class="mini-box">
            <small>Banco</small>
            <strong>SUPABASE</strong>
          </div>
        </div>
      `
    };

    function showError(msg){
      loginError.style.display = "block";
      loginError.textContent = msg;
    }

    function clearError(){
      loginError.style.display = "none";
      loginError.textContent = "";
    }

    function setTab(tabName){
      tabButtons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.tab === tabName);
      });

      tabContent.innerHTML = tabViews[tabName];

      if (tabName === "dev" && currentUser) {
        document.getElementById("devUserValue").textContent = currentUser.username || "-";
      }
    }

    async function loginDev(){
      clearError();

      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showError("PREENCHA USUÁRIO E SENHA");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Entrando...";

      const { data, error } = await db
        .from("users")
        .select("*")
        .eq("username", username)
        .eq("password", password)
        .eq("type", "DEV")
        .maybeSingle();

      loginBtn.disabled = false;
      loginBtn.textContent = "Entrar";

      if (error) {
        showError("ERRO AO CONECTAR NO SUPABASE");
        return;
      }

      if (!data) {
        showError("LOGIN INVÁLIDO");
        return;
      }

      currentUser = data;
      loginScreen.classList.add("hidden");
      panelScreen.classList.remove("hidden");
      setTab("hg");
    }

    function logoutDev(){
      currentUser = null;
      panelScreen.classList.add("hidden");
      loginScreen.classList.remove("hidden");
      document.getElementById("password").value = "";
      clearError();
    }

    loginBtn.addEventListener("click", loginDev);
    logoutBtn.addEventListener("click", logoutDev);

    document.getElementById("username").addEventListener("keydown", e => {
      if (e.key === "Enter") loginDev();
    });

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") loginDev();
    });

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });
  </script>
</body>
</html>
