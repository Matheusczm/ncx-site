<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevCore</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg1:#07101f;
      --bg2:#0c1630;
      --theme1:#2563eb;
      --theme2:#3b82f6;
      --soft:#dbeafe;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --shadow:0 24px 60px rgba(0,0,0,.22);
      --glass:rgba(255,255,255,.18);
      --glassBorder:rgba(255,255,255,.22);
      --danger:#ef4444;
      --success:#22c55e;
      --warning:#f59e0b;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 30%),
        linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      padding:0;
    }

    .app{
      width:min(100vw, 430px);
      min-height:100vh;
      height:100dvh;
      background:#fff;
      overflow:hidden;
      position:relative;
    }

    @media (min-width:431px){
      body{ padding:18px; }
      .app{
        width:min(100vw - 24px, 430px);
        height:844px;
        min-height:844px;
        border-radius:32px;
        box-shadow:var(--shadow);
      }
    }

    .base-bg{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,var(--theme1) 0%, var(--theme2) 42%, #f8fafc 42%, #f8fafc 100%);
      z-index:1;
      transition:background .25s ease;
    }

    .screen{
      position:relative;
      z-index:2;
      height:100%;
    }

    .hidden{ display:none !important; }

    .login-screen{
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
    }

    .login-card{
      width:100%;
      background:rgba(255,255,255,.98);
      border-radius:28px;
      padding:22px;
      box-shadow:0 20px 50px rgba(0,0,0,.12);
      border:1px solid rgba(255,255,255,.7);
    }

    .logo{
      width:84px;
      height:84px;
      border-radius:50%;
      background:linear-gradient(180deg,var(--theme1),var(--theme2));
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:16px;
      box-shadow:0 16px 35px rgba(37,99,235,.28);
      border:3px solid rgba(255,255,255,.8);
      color:#fff;
      font-size:34px;
      font-weight:900;
    }

    h1{
      font-size:28px;
      font-weight:900;
      color:var(--text);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:-.5px;
    }

    .subtitle{
      color:var(--muted);
      font-size:14px;
      margin-bottom:18px;
    }

    .field{ margin-bottom:14px; }

    .field label{
      display:block;
      font-size:13px;
      font-weight:800;
      color:#1f2937;
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .field input,
    .field select{
      width:100%;
      border:1px solid var(--line);
      background:#f9fafb;
      border-radius:16px;
      padding:15px 14px;
      font-size:15px;
      color:var(--text);
      outline:none;
    }

    .field input:focus,
    .field select:focus{
      border-color:#93c5fd;
      box-shadow:0 0 0 4px rgba(59,130,246,.10);
    }

    .btn{
      width:100%;
      border:none;
      border-radius:18px;
      padding:15px 16px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      text-transform:uppercase;
    }

    .btn-primary{
      background:linear-gradient(180deg,var(--theme1),var(--theme2));
      color:#fff;
      box-shadow:0 12px 26px rgba(37,99,235,.22);
    }

    .btn-dark{
      background:#111827;
      color:#fff;
    }

    .btn-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .error-box{
      background:#fef2f2;
      color:#b91c1c;
      border:1px solid #fecaca;
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      margin-bottom:14px;
      display:none;
      text-transform:uppercase;
      font-weight:700;
      white-space:pre-line;
    }

    .hint{
      margin-top:14px;
      color:#6b7280;
      font-size:12px;
      line-height:1.7;
    }

    .panel-screen{
      height:100%;
      display:flex;
      flex-direction:column;
    }

    .top{
      padding:18px 16px 10px;
      color:#fff;
      flex:0 0 auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .avatar{
      width:56px;
      height:56px;
      border-radius:50%;
      background:rgba(255,255,255,.92);
      color:#7a7a7a;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:26px;
      font-weight:900;
      flex-shrink:0;
    }

    .brand-text h2{
      font-size:18px;
      font-weight:900;
      line-height:1.1;
      margin-bottom:4px;
      text-transform:uppercase;
    }

    .brand-text p{
      font-size:14px;
      opacity:.95;
      font-weight:600;
    }

    .logout-btn{
      background:var(--glass);
      color:#fff;
      border:1px solid var(--glassBorder);
      border-radius:12px;
      padding:10px 12px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      cursor:pointer;
    }

    .banner{
      background:rgba(255,255,255,.16);
      border:1px solid rgba(255,255,255,.14);
      border-radius:18px;
      padding:12px 14px;
      margin-bottom:12px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .warning{
      background:#fff7ed;
      color:#9a3412;
      border:1px solid #fdba74;
      border-radius:14px;
      padding:10px 12px;
      margin-bottom:12px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      line-height:1.5;
      display:none;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .stat{
      background:linear-gradient(180deg, rgba(0,0,0,.14), rgba(0,0,0,.08));
      border-radius:20px;
      padding:14px;
      min-height:120px;
      border:1px solid rgba(255,255,255,.08);
    }

    .stat .label{
      font-size:11px;
      opacity:.95;
      margin-bottom:12px;
      font-weight:800;
      text-transform:uppercase;
    }

    .stat .value{
      font-size:34px;
      font-weight:900;
      line-height:1;
      margin-bottom:12px;
    }

    .stat .sub{
      font-size:11px;
      opacity:.95;
      text-transform:uppercase;
      font-weight:700;
    }

    .main{
      flex:1 1 auto;
      min-height:0;
      background:#f8fafc;
      border-top-left-radius:28px;
      border-top-right-radius:28px;
      padding:14px 14px 84px;
      overflow-y:auto;
      overflow-x:hidden;
    }

    .tabs{
      display:grid;
      gap:8px;
      margin-bottom:16px;
    }

    .tabs button{
      border:none;
      background:#eef2f7;
      color:#1f2937;
      border-radius:14px;
      padding:10px 6px;
      font-size:11px;
      font-weight:900;
      text-transform:uppercase;
      cursor:pointer;
    }

    .tabs button.active{
      background:var(--soft);
      color:var(--theme1);
    }

    .panel{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:22px;
      padding:16px;
      box-shadow:0 18px 45px rgba(15,23,42,.07);
    }

    .panel-title{
      font-size:18px;
      font-weight:900;
      color:var(--text);
      margin-bottom:14px;
      text-transform:uppercase;
    }

    .panel-card{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:18px;
      padding:14px;
      margin-bottom:12px;
    }

    .panel-card:last-child{
      margin-bottom:0;
    }

    .panel-card h3{
      font-size:15px;
      font-weight:900;
      color:#111827;
      margin-bottom:8px;
      text-transform:uppercase;
    }

    .panel-card p{
      font-size:13px;
      color:#6b7280;
      line-height:1.6;
      text-transform:uppercase;
    }

    .profile-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .mini-box{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:12px;
    }

    .mini-box small{
      display:block;
      font-size:10px;
      color:#6b7280;
      margin-bottom:6px;
      text-transform:uppercase;
      font-weight:700;
    }

    .mini-box strong{
      font-size:13px;
      color:#111827;
      text-transform:uppercase;
      word-break:break-word;
    }

    .user-list{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .user-item{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:16px;
      padding:12px;
    }

    .user-item strong{
      display:block;
      font-size:14px;
      color:#111827;
      margin-bottom:6px;
      text-transform:uppercase;
    }

    .user-item span{
      display:block;
      font-size:12px;
      color:#6b7280;
      text-transform:uppercase;
      line-height:1.5;
      word-break:break-word;
    }

    .bottom-nav{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(14px);
      height:74px;
      display:flex;
      justify-content:space-around;
      align-items:center;
      border-top:1px solid rgba(15,23,42,.06);
      z-index:3;
    }

    .nav-item{
      text-align:center;
      color:#8a93a3;
      font-size:10px;
      font-weight:800;
      cursor:pointer;
      text-transform:uppercase;
    }

    .nav-item .icon{
      display:block;
      font-size:18px;
      margin-bottom:4px;
    }

    .nav-item.active{
      color:var(--theme1);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="base-bg" id="baseBg"></div>

    <div class="screen" id="loginScreen">
      <div class="login-screen">
        <div class="login-card">
          <div class="logo" id="loginLogo">D</div>
          <h1>Login</h1>
          <div class="subtitle">Acesso do painel principal.</div>

          <div class="error-box" id="loginError"></div>

          <div class="field">
            <label for="username">Usuário</label>
            <input id="username" type="text" placeholder="Digite seu usuário">
          </div>

          <div class="field">
            <label for="password">Senha</label>
            <input id="password" type="password" placeholder="Digite sua senha">
          </div>

          <button class="btn btn-primary" id="loginBtn">Entrar</button>

          <div class="hint">
            Login pelo Supabase.<br>
            DEV vê tudo.<br>
            HG/DRIP/MISTO entram direto no próprio painel.
          </div>
        </div>
      </div>
    </div>

    <div class="screen hidden" id="panelScreen">
      <div class="panel-screen">
        <div class="top">
          <div class="topbar">
            <div class="brand">
              <div class="avatar" id="mainAvatar">D</div>
              <div class="brand-text">
                <h2 id="mainTitle">Development</h2>
                <p id="mainSubtitle">Painel administrativo</p>
              </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Sair</button>
          </div>

          <div class="banner" id="mainBanner">Modo desenvolvedor • painel principal</div>
          <div class="warning" id="mainWarning"></div>

          <div class="stats">
            <div class="stat">
              <div class="label">Sessão</div>
              <div class="value">ON</div>
              <div class="sub" id="sessionTypeText">Status atual</div>
            </div>
            <div class="stat">
              <div class="label">Painéis</div>
              <div class="value" id="panelsCount">4</div>
              <div class="sub" id="panelsLabel">HG, DRIP, MISTO, DEV</div>
            </div>
          </div>
        </div>

        <div class="main">
          <div class="tabs" id="tabsContainer"></div>
          <div class="panel" id="tabContent"></div>
        </div>

        <div class="bottom-nav" id="bottomNav"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://iwhldffataeqmpntprvk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wYhrdDe0bM-H3QqmcMwXRQ_RGb_u5ok";
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const TYPE_THEMES = {
      DEV: { c1:"#f59e0b", c2:"#fbbf24", soft:"#fef3c7", title:"Development", subtitle:"Painel administrativo", banner:"Modo desenvolvedor • painel principal", panels:4, logo:"D" },
      HG: { c1:"#d62828", c2:"#ef4444", soft:"#fee2e2", title:"HG Menu", subtitle:"Painel do cliente", banner:"Acesso HG ativo", panels:1, logo:"H" },
      DRIP: { c1:"#6d28d9", c2:"#8b5cf6", soft:"#ede9fe", title:"DRIP Menu", subtitle:"Painel do cliente", banner:"Acesso DRIP ativo", panels:1, logo:"D" },
      MISTO: { c1:"#d81b60", c2:"#8e24aa", soft:"#fce7f3", title:"MISTO Menu", subtitle:"Painel do cliente", banner:"Acesso MISTO ativo", panels:1, logo:"M" }
    };

    const loginScreen = document.getElementById("loginScreen");
    const panelScreen = document.getElementById("panelScreen");
    const loginError = document.getElementById("loginError");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const mainAvatar = document.getElementById("mainAvatar");
    const baseBg = document.getElementById("baseBg");
    const tabsContainer = document.getElementById("tabsContainer");
    const bottomNav = document.getElementById("bottomNav");
    const tabContent = document.getElementById("tabContent");

    let currentUser = null;
    let currentTab = "hg";

    function showError(msg){
      loginError.style.display = "block";
      loginError.textContent = msg;
    }

    function clearError(){
      loginError.style.display = "none";
      loginError.textContent = "";
    }

    async function sha256(text) {
      const data = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    }

    function formatDateBr(dateValue){
      if (!dateValue) return "NÃO DEFINIDA";
      return new Date(dateValue).toLocaleString("pt-BR");
    }

    function isExpired(expiresAt){
      if (!expiresAt) return false;
      return new Date(expiresAt) <= new Date();
    }

    function applyTheme(type){
      const theme = TYPE_THEMES[type] || TYPE_THEMES.DEV;
      document.documentElement.style.setProperty("--theme1", theme.c1);
      document.documentElement.style.setProperty("--theme2", theme.c2);
      document.documentElement.style.setProperty("--soft", theme.soft);
      baseBg.style.background = `linear-gradient(180deg, ${theme.c1} 0%, ${theme.c2} 42%, #f8fafc 42%, #f8fafc 100%)`;
      document.getElementById("loginLogo").textContent = theme.logo;
      document.getElementById("mainTitle").textContent = theme.title;
      document.getElementById("mainSubtitle").textContent = theme.subtitle;
      document.getElementById("mainBanner").textContent = theme.banner;
      document.getElementById("panelsCount").textContent = theme.panels;
      document.getElementById("panelsLabel").textContent = type === "DEV" ? "HG, DRIP, MISTO, DEV" : `${type} VISÍVEL`;
      document.getElementById("sessionTypeText").textContent = `TIPO ${type}`;
    }

    function getAllowedTabs(type){
      if (type === "DEV") {
        return [
          { key:"hg", label:"HG", icon:"H" },
          { key:"drip", label:"DRIP", icon:"D" },
          { key:"misto", label:"MISTO", icon:"M" },
          { key:"dev", label:"DEV", icon:"⚙" }
        ];
      }
      if (type === "HG") return [{ key:"hg", label:"HG", icon:"H" }];
      if (type === "DRIP") return [{ key:"drip", label:"DRIP", icon:"D" }];
      if (type === "MISTO") return [{ key:"misto", label:"MISTO", icon:"M" }];
      return [{ key:"hg", label:"HG", icon:"H" }];
    }

    function buildTabsForType(type){
      const tabs = getAllowedTabs(type);
      tabsContainer.style.gridTemplateColumns = `repeat(${tabs.length},1fr)`;
      tabsContainer.innerHTML = tabs.map(tab => `
        <button class="${tab.key === currentTab ? 'active' : ''}" onclick="setTab('${tab.key}')">${tab.label}</button>
      `).join("");

      bottomNav.innerHTML = tabs.map(tab => `
        <div class="nav-item ${tab.key === currentTab ? 'active' : ''}" onclick="setTab('${tab.key}')">
          <span class="icon">${tab.icon}</span>${tab.label}
        </div>
      `).join("");
    }

    function getPanelHtml(tabName){
      const commonType = currentUser?.type || "DEV";

      if (tabName === "hg") {
        return `
          <div class="panel-title">HG</div>
          <div class="panel-card">
            <h3>HG MENU</h3>
            <p>PAINEL HG ATIVO.</p>
          </div>
          <div class="panel-card">
            <h3>STATUS</h3>
            <p>USUÁRIO: ${currentUser.username}<br>TIPO: ${commonType}</p>
          </div>
        `;
      }

      if (tabName === "drip") {
        return `
          <div class="panel-title">DRIP</div>
          <div class="panel-card">
            <h3>DRIP MENU</h3>
            <p>PAINEL DRIP ATIVO.</p>
          </div>
          <div class="panel-card">
            <h3>STATUS</h3>
            <p>USUÁRIO: ${currentUser.username}<br>TIPO: ${commonType}</p>
          </div>
        `;
      }

      if (tabName === "misto") {
        return `
          <div class="panel-title">MISTO</div>
          <div class="panel-card">
            <h3>MISTO MENU</h3>
            <p>PAINEL MISTO ATIVO.</p>
          </div>
          <div class="panel-card">
            <h3>STATUS</h3>
            <p>USUÁRIO: ${currentUser.username}<br>TIPO: ${commonType}</p>
          </div>
        `;
      }

      return `
        <div class="panel-title">DEV</div>

        <div class="panel-card">
          <h3>Criar usuário</h3>

          <div class="field">
            <label for="newUser">Usuário</label>
            <input id="newUser" placeholder="Digite o usuário">
          </div>

          <div class="field">
            <label for="newPass">Senha</label>
            <input id="newPass" type="password" placeholder="Digite a senha">
          </div>

          <div class="field">
            <label for="newType">Tipo</label>
            <select id="newType">
              <option value="HG">HG</option>
              <option value="DRIP">DRIP</option>
              <option value="MISTO">MISTO</option>
              <option value="DEV">DEV</option>
            </select>
          </div>

          <div class="field">
            <label for="newValidity">Validade</label>
            <select id="newValidity">
              <option value="1">1 DIA</option>
              <option value="7">7 DIAS</option>
              <option value="30">30 DIAS</option>
              <option value="permanente">PERMANENTE</option>
            </select>
          </div>

          <div class="btn-row">
            <button class="btn btn-primary" onclick="criarUsuario()">Criar</button>
            <button class="btn btn-dark" onclick="carregarUsuarios()">Atualizar</button>
          </div>
        </div>

        <div class="panel-card">
          <h3>Usuários do banco</h3>
          <div id="listaUsers" class="user-list">Carregando...</div>
        </div>

        <div class="panel-card">
          <h3>Perfil DEV</h3>
          <div class="profile-grid">
            <div class="mini-box">
              <small>Usuário</small>
              <strong>${currentUser.username}</strong>
            </div>
            <div class="mini-box">
              <small>Tipo</small>
              <strong>${currentUser.type}</strong>
            </div>
            <div class="mini-box">
              <small>Status</small>
              <strong>ONLINE</strong>
            </div>
            <div class="mini-box">
              <small>Banco</small>
              <strong>SUPABASE</strong>
            </div>
          </div>
        </div>
      `;
    }

    function setTab(tabName){
      currentTab = tabName;
      buildTabsForType(currentUser.type);
      tabContent.innerHTML = getPanelHtml(tabName);
      if (tabName === "dev" && currentUser.type === "DEV") {
        setTimeout(carregarUsuarios, 100);
      }
    }

    function showWarning(msg){
      const el = document.getElementById("mainWarning");
      el.style.display = "block";
      el.textContent = msg;
    }

    function clearWarning(){
      const el = document.getElementById("mainWarning");
      el.style.display = "none";
      el.textContent = "";
    }

    async function loginUser(){
      clearError();

      const username = document.getElementById("username").value.trim().toLowerCase();
      const password = document.getElementById("password").value;

      if (!username || !password) {
        showError("PREENCHA USUÁRIO E SENHA");
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = "Entrando...";

      const { data, error } = await db
        .from("users")
        .select("*")
        .eq("username", username)
        .maybeSingle();

      loginBtn.disabled = false;
      loginBtn.textContent = "Entrar";

      if (error) {
        showError("ERRO AO CONECTAR NO SUPABASE");
        return;
      }

      if (!data) {
        showError("LOGIN INVÁLIDO");
        return;
      }

      const inputHash = await sha256(password);
      const legacyOk = data.password && data.password === password;
      const hashOk = data.password_hash && data.password_hash === inputHash;

      if (!legacyOk && !hashOk) {
        showError("LOGIN INVÁLIDO");
        return;
      }

      if (isExpired(data.expires_at)) {
        showError("ACESSO EXPIRADO");
        return;
      }

      currentUser = data;
      mainAvatar.textContent = currentUser.username ? currentUser.username[0].toUpperCase() : "U";

      applyTheme(currentUser.type || "DEV");
      clearWarning();

      if (currentUser.expires_at) {
        showWarning(`VALIDADE ATÉ ${formatDateBr(currentUser.expires_at)}`);
      }

      loginScreen.classList.add("hidden");
      panelScreen.classList.remove("hidden");

      currentTab = currentUser.type === "DEV"
        ? "dev"
        : currentUser.type === "HG"
          ? "hg"
          : currentUser.type === "DRIP"
            ? "drip"
            : "misto";

      setTab(currentTab);
    }

    async function criarUsuario(){
      const username = document.getElementById("newUser")?.value.trim();
      const password = document.getElementById("newPass")?.value.trim();
      const type = document.getElementById("newType")?.value;
      const validity = document.getElementById("newValidity")?.value;

      if (!username || !password) {
        alert("PREENCHA TUDO");
        return;
      }

      const password_hash = await sha256(password);

      let expires_at = null;
      if (validity !== "permanente") {
        const date = new Date();
        date.setDate(date.getDate() + parseInt(validity, 10));
        expires_at = date.toISOString();
      }

      const { error } = await db.from("users").insert([
        {
          username,
          password: null,
          password_hash,
          type,
          expires_at
        }
      ]);

      if (error) {
        alert("ERRO: " + error.message);
        return;
      }

      alert("USUÁRIO CRIADO!");
      document.getElementById("newUser").value = "";
      document.getElementById("newPass").value = "";
      document.getElementById("newType").value = "HG";
      document.getElementById("newValidity").value = "1";
      carregarUsuarios();
    }

    async function carregarUsuarios(){
      const lista = document.getElementById("listaUsers");
      if (!lista) return;

      lista.innerHTML = "Carregando...";

      const { data, error } = await db
        .from("users")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        lista.innerHTML = "<div class='user-item'><span>ERRO AO CARREGAR</span></div>";
        return;
      }

      if (!data || !data.length) {
        lista.innerHTML = "<div class='user-item'><span>NENHUM USUÁRIO</span></div>";
        return;
      }

      lista.innerHTML = data.map(u => {
        const expired = isExpired(u.expires_at);
        return `
          <div class="user-item">
            <strong>${u.username}</strong>
            <span>TIPO: ${u.type || "NÃO DEFINIDO"}</span>
            <span>SENHA: •••••••</span>
            <span>VALIDADE: ${u.expires_at ? formatDateBr(u.expires_at) : "PERMANENTE"}</span>
            <span>STATUS: ${expired ? "EXPIRADO" : "ATIVO"}</span>
          </div>
        `;
      }).join("");
    }

    function logoutUser(){
      currentUser = null;
      panelScreen.classList.add("hidden");
      loginScreen.classList.remove("hidden");
      document.getElementById("password").value = "";
      document.getElementById("username").value = "";
      clearError();
      clearWarning();
      applyTheme("DEV");
    }

    loginBtn.addEventListener("click", loginUser);
    logoutBtn.addEventListener("click", logoutUser);

    document.getElementById("username").addEventListener("keydown", e => {
      if (e.key === "Enter") loginUser();
    });

    document.getElementById("password").addEventListener("keydown", e => {
      if (e.key === "Enter") loginUser();
    });
  </script>
</body>
