<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #121933;
      --panel: #f4f7fb;
      --card: rgba(255,255,255,0.08);
      --card-strong: rgba(255,255,255,0.12);
      --text: #0f172a;
      --muted: #6b7280;
      --white: #ffffff;
      --line: rgba(255,255,255,0.08);
      --blue-1: #2563eb;
      --blue-2: #3b82f6;
      --blue-3: #60a5fa;
      --green: #22c55e;
      --green-dark: #16a34a;
      --danger: #ef4444;
      --shadow: 0 24px 60px rgba(0,0,0,0.30);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.24), transparent 30%),
        linear-gradient(180deg, #060914 0%, #0d1428 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      color: var(--text);
    }

    .phone {
      width: 390px;
      min-height: 844px;
      background:
        linear-gradient(180deg, #1d4ed8 0%, #2563eb 18%, #3b82f6 34%, #eef3f9 34%, #eef3f9 100%);
      border-radius: 34px;
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .top {
      padding: 24px 22px 18px;
      color: var(--white);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .brand-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      color: #8b8b8b;
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 800;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.08);
    }

    .brand-meta h1 {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }

    .brand-meta p {
      font-size: 14px;
      opacity: 0.9;
      font-weight: 500;
    }

    .actions-top {
      display: flex;
      gap: 14px;
      align-items: center;
      font-size: 23px;
      opacity: 0.95;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .stat-card {
      background: linear-gradient(180deg, rgba(22,40,110,0.72), rgba(29,78,216,0.55));
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      padding: 18px;
      min-height: 168px;
      position: relative;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .stat-label {
      font-size: 15px;
      font-weight: 500;
      opacity: 0.95;
      margin-bottom: 16px;
    }

    .stat-value {
      font-size: 58px;
      line-height: 1;
      font-weight: 800;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .stat-sub {
      font-size: 14px;
      opacity: 0.95;
    }

    .stat-mini {
      font-size: 18px;
      margin-top: 6px;
      font-weight: 700;
      color: #fca5a5;
    }

    .stat-mini.white {
      color: var(--white);
    }

    .go-badge {
      position: absolute;
      right: 16px;
      bottom: 16px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(180deg, #30e46c, #16a34a);
      color: white;
      display: grid;
      place-items: center;
      font-size: 22px;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(34,197,94,0.42);
    }

    .main {
      background: #eef3f9;
      min-height: 590px;
      border-top-left-radius: 30px;
      border-top-right-radius: 30px;
      padding: 18px 16px 96px;
    }

    .tabs {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 16px;
      font-weight: 800;
      color: #1f2937;
      margin: 4px 2px 18px;
      flex-wrap: wrap;
    }

    .tabs span {
      cursor: pointer;
    }

    .panel {
      background: rgba(255,255,255,0.96);
      border-radius: 26px;
      padding: 18px;
      box-shadow: 0 18px 45px rgba(15,23,42,0.07);
      border: 1px solid rgba(15,23,42,0.04);
    }

    .panel.hidden {
      display: none;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .key-box {
      width: 100%;
      border-radius: 20px;
      padding: 18px 16px;
      margin-bottom: 16px;
      text-align: center;
      background: linear-gradient(180deg, #04122e, #071a43);
      color: #22f06b;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
      word-break: break-word;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .field select,
    .field input {
      width: 100%;
      border: 1px solid #dbe3ee;
      background: #f9fbff;
      border-radius: 16px;
      padding: 15px 14px;
      font-size: 15px;
      color: #111827;
      outline: none;
    }

    .field select:focus,
    .field input:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(59,130,246,0.10);
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 6px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: linear-gradient(180deg, #2670ff, #1d4ed8);
      color: white;
      box-shadow: 0 12px 26px rgba(37,99,235,0.28);
    }

    .btn-dark {
      background: linear-gradient(180deg, #061635, #03102b);
      color: white;
    }

    .btn-success {
      width: 100%;
      margin-top: 12px;
      background: linear-gradient(180deg, #25d366, #16a34a);
      color: white;
      box-shadow: 0 12px 24px rgba(34,197,94,0.22);
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      background: #f8fbff;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 14px;
    }

    .item .code {
      font-size: 14px;
      font-weight: 800;
      color: #111827;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .item .meta {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.6;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      font-size: 14px;
      padding: 18px 8px;
    }

    .profile-box {
      display: grid;
      gap: 12px;
    }

    .profile-card {
      border-radius: 18px;
      background: #f8fbff;
      border: 1px solid #e2e8f0;
      padding: 16px;
    }

    .profile-card strong {
      color: #111827;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(14px);
      height: 84px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      border-top: 1px solid rgba(15,23,42,0.06);
    }

    .nav-item {
      text-align: center;
      color: #8a93a3;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-item .icon {
      display: block;
      font-size: 22px;
      margin-bottom: 5px;
    }

    .nav-item.active {
      color: #2563eb;
    }

    @media (max-width: 430px) {
      body {
        padding: 0;
      }

      .phone {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="top">
      <div class="topbar">
        <div class="brand-wrap">
          <div class="avatar">K</div>
          <div class="brand-meta">
            <h1>Key Manager</h1>
            <p>Premium</p>
          </div>
        </div>

        <div class="actions-top">
          <span>⌕</span>
          <span>⌘</span>
        </div>
      </div>

      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-label">◫ Devices</div>
          <div class="stat-value" id="devicesCount">0</div>
          <div class="stat-sub">Expired devices</div>
          <div class="stat-mini" id="expiredDevicesCount">0</div>
          <div class="go-badge">➜</div>
        </div>

        <div class="stat-card">
          <div class="stat-label">⛓ Keys</div>
          <div class="stat-value" id="keysCount">0</div>
          <div class="stat-sub">Packages</div>
          <div class="stat-mini white">4</div>
          <div class="go-badge">➜</div>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="tabs">
        <span onclick="showView('home')">Criar</span>
        <span onclick="showView('validas')">Válidas</span>
        <span onclick="showView('invalidas')">Inválidas</span>
        <span onclick="showView('perfil')">Perfil</span>
      </div>

      <div id="view-home" class="panel">
        <div class="panel-title">Criar licença</div>

        <div class="key-box" id="keyAtual">HG-ZG00ZL</div>

        <div class="field">
          <label for="formato">Formato</label>
          <select id="formato">
            <option value="hg">HG-XXXXXX</option>
            <option value="sem">XXXXXX</option>
            <option value="misto">Misto</option>
          </select>
        </div>

        <div class="field">
          <label for="dias">Dias</label>
          <select id="dias">
            <option value="1">1 dia</option>
            <option value="7">7 dias</option>
            <option value="10">10 dias</option>
            <option value="30">30 dias</option>
          </select>
        </div>

        <div class="btn-row">
          <button class="btn-primary" onclick="gerarPreview()">Gerar key</button>
          <button class="btn-dark" onclick="copiarKey()">Copiar</button>
        </div>

        <button class="btn-success" onclick="salvarKey()">Salvar key</button>
      </div>

      <div id="view-validas" class="panel hidden">
        <div class="panel-title">Licenças válidas</div>
        <div id="listaValidas" class="list"></div>
      </div>

      <div id="view-invalidas" class="panel hidden">
        <div class="panel-title">Licenças inválidas</div>
        <div id="listaInvalidas" class="list"></div>
      </div>

      <div id="view-perfil" class="panel hidden">
        <div class="panel-title">Perfil</div>
        <div class="profile-box">
          <div class="profile-card">
            <div style="line-height:1.8; color:#6b7280; font-size:14px;">
              Nome: <strong>Key Manager</strong><br>
              Plano: <strong>Premium</strong><br>
              Status: <strong>Online</strong><br>
              Sistema: <strong>Ativo</strong>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active" onclick="showView('home', this)">
        <span class="icon">▦</span>
        Home
      </div>
      <div class="nav-item" onclick="showView('validas', this)">
        <span class="icon">⛓</span>
        Válidas
      </div>
      <div class="nav-item" onclick="showView('invalidas', this)">
        <span class="icon">▣</span>
        Inválidas
      </div>
      <div class="nav-item" onclick="showView('perfil', this)">
        <span class="icon">◉</span>
        Perfil
      </div>
    </div>
  </div>

  <script>
    let previewKey = "";

    function letras(qtd) {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      let r = "";
      for (let i = 0; i < qtd; i++) {
        r += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return r;
    }

    function criarKey() {
      const formato = document.getElementById("formato").value;

      if (formato === "hg") return "HG-" + letras(6);
      if (formato === "sem") return letras(6);

      return Math.random() < 0.9 ? "HG-" + letras(6) : letras(6);
    }

    function gerarPreview() {
      previewKey = criarKey();
      document.getElementById("keyAtual").textContent = previewKey;
    }

    function copiarKey() {
      const key = document.getElementById("keyAtual").textContent;
      navigator.clipboard.writeText(key).then(() => {
        alert("Key copiada: " + key);
      });
    }

    function getKeys() {
      return JSON.parse(localStorage.getItem("key_manager_keys") || "[]");
    }

    function setKeys(keys) {
      localStorage.setItem("key_manager_keys", JSON.stringify(keys));
    }

    function salvarKey() {
      if (!previewKey) gerarPreview();

      const dias = parseInt(document.getElementById("dias").value, 10);
      const agora = new Date();
      const expira = new Date();
      expira.setDate(agora.getDate() + dias);

      const keys = getKeys();

      keys.push({
        code: previewKey,
        dias: dias,
        criadaEm: agora.toISOString(),
        expiraEm: expira.toISOString()
      });

      setKeys(keys);
      atualizarTudo();
      alert("Key salva com sucesso.");
      gerarPreview();
    }

    function separarKeys() {
      const agora = new Date();
      const keys = getKeys();
      const validas = [];
      const invalidas = [];

      keys.forEach(k => {
        if (new Date(k.expiraEm) > agora) {
          validas.push(k);
        } else {
          invalidas.push(k);
        }
      });

      return { validas, invalidas };
    }

    function formatarData(iso) {
      const d = new Date(iso);
      return d.toLocaleString("pt-BR");
    }

    function renderListas() {
      const { validas, invalidas } = separarKeys();
      const listaValidas = document.getElementById("listaValidas");
      const listaInvalidas = document.getElementById("listaInvalidas");

      listaValidas.innerHTML = "";
      listaInvalidas.innerHTML = "";

      if (!validas.length) {
        listaValidas.innerHTML = '<div class="empty">Nenhuma licença válida.</div>';
      } else {
        validas.forEach(k => {
          listaValidas.innerHTML += `
            <div class="item">
              <div class="code">${k.code}</div>
              <div class="meta">
                Dias: ${k.dias}<br>
                Criada em: ${formatarData(k.criadaEm)}<br>
                Expira em: ${formatarData(k.expiraEm)}
              </div>
            </div>
          `;
        });
      }

      if (!invalidas.length) {
        listaInvalidas.innerHTML = '<div class="empty">Nenhuma licença inválida.</div>';
      } else {
        invalidas.forEach(k => {
          listaInvalidas.innerHTML += `
            <div class="item">
              <div class="code">${k.code}</div>
              <div class="meta">
                Dias: ${k.dias}<br>
                Criada em: ${formatarData(k.criadaEm)}<br>
                Expirada em: ${formatarData(k.expiraEm)}
              </div>
            </div>
          `;
        });
      }
    }

    function atualizarCards() {
      const { validas, invalidas } = separarKeys();
      document.getElementById("keysCount").textContent = validas.length;
      document.getElementById("expiredDevicesCount").textContent = invalidas.length;
      document.getElementById("devicesCount").textContent = 0;
    }

    function atualizarTudo() {
      renderListas();
      atualizarCards();
    }

    function showView(view, el = null) {
      document.getElementById("view-home").classList.add("hidden");
      document.getElementById("view-validas").classList.add("hidden");
      document.getElementById("view-invalidas").classList.add("hidden");
      document.getElementById("view-perfil").classList.add("hidden");

      document.getElementById("view-" + view).classList.remove("hidden");

      document.querySelectorAll(".nav-item").forEach(item => item.classList.remove("active"));
      if (el) el.classList.add("active");
    }

    gerarPreview();
    atualizarTudo();
  </script>
</body>
</html>
