<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111827;
      color:white;
      padding:20px;
    }
    input,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
      font-size:16px;
    }
    button{
      background:#2563eb;
      color:white;
      font-weight:bold;
    }
    pre{
      background:#000;
      padding:12px;
      border-radius:10px;
      margin-top:16px;
      white-space:pre-wrap;
      word-break:break-word;
    }
  </style>
</head>
<body>
  <h2>Teste de conexão Supabase</h2>

  <input id="username" placeholder="Usuário">
  <input id="password" type="password" placeholder="Senha">
  <button onclick="testarLogin()">Testar login</button>

  <pre id="log">Aguardando teste...</pre>

  <script>
    const SUPABASE_URL = "https://iwhldffataeqmpntprvk.supabase.co";
    const SUPABASE_KEY = "sb_publishable_wYhrdDe0bM-H3QqmcMwXRQ_RGb_u5ok";

    const log = (msg) => {
      document.getElementById("log").textContent += "\\n" + msg;
    };

    document.getElementById("log").textContent =
      "Página carregou. Iniciando cliente Supabase...";

    const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function sha256(text){
      const data = new TextEncoder().encode(text);
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, "0"))
        .join("");
    }

    async function testarLogin(){
      try{
        document.getElementById("log").textContent = "Testando conexão...";

        const username = document.getElementById("username").value.trim().toLowerCase();
        const password = document.getElementById("password").value.trim();

        log("Usuário digitado: " + username);

        const { data, error } = await supa
          .from("users")
          .select("*")
          .eq("username", username)
          .maybeSingle();

        if(error){
          log("ERRO SUPABASE:");
          log(JSON.stringify(error, null, 2));
          return;
        }

        if(!data){
          log("Nenhum usuário encontrado no banco.");
          return;
        }

        log("Usuário encontrado no banco.");
        log("Tipo: " + data.type);

        const hash = await sha256(password);
        log("Hash gerado da senha digitada.");

        if(data.password_hash !== hash){
          log("Senha incorreta.");
          return;
        }

        if(data.is_disabled){
          log("Conta desativada.");
          return;
        }

        if(data.expires_at && new Date() > new Date(data.expires_at)){
          log("Conta expirada.");
          return;
        }

        log("LOGIN OK.");
      }catch(e){
        log("ERRO GERAL:");
        log(String(e));
      }
    }
  </script>
</body>
</html>
